<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Menu Summoner</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: transparent; height: 100%; user-select: none; }
        .wrapper { width: 100%; height: 100%; display: flex; align-items: center; }

        .handle {
            box-sizing: border-box;
            background: rgba(255, 237, 242, 0.4);
            border: 3px solid rgba(255, 122, 162, 0.4);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            box-shadow: none;
            transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease, transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.5s ease;
        }

        .handle img {
            opacity: 0.6;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        /* Chế độ Bám Cạnh (Tai Thỏ) */
        body.edge .wrapper { justify-content: flex-end; }
        body.edge .handle {
            width: 24px; height: 60px;
            border-right: none;
            border-radius: 14px 0 0 14px;
            cursor: grab;
        }
        body.edge .handle img { width: 14px; height: 14px; }

        .handle:hover {
            background: rgba(255, 237, 242, 0.95);
            border-color: rgba(255, 122, 162, 1);
            box-shadow: -2px 2px 4px rgba(0,0,0,0.15); 
        }
        .handle:hover img { opacity: 1; }

        .handle:active { transform: scale(0.94); cursor: grabbing; background: rgba(230, 200, 215, 0.9); }

        /* Chế độ nghỉ (Idle) - Làm mờ và lùi về viền */
        body.edge.idle .handle {
            width: 15px;
            transform: translateX(10px);
            background: rgba(255, 237, 242, 0.1);
            border-color: transparent;
            border-radius: 10px 0 0 10px;
        }
        body.edge.idle .handle img { opacity: 0; }
    </style>
</head>
<body class="edge">
    <div class="wrapper">
        <div class="handle" id="btn" title="Kéo và nhả (Drag) để dời vị trí. Click thả ngay để Mở Menu">
            <img src="Bunny_Sunny.png">
        </div>
    </div>
    <script>
const { ipcRenderer } = require('electron');
const btn = document.getElementById('btn');
let isDragging = false;
let hasMoved = false;
let initialScreenX = 0, initialScreenY = 0;
btn.addEventListener('pointerdown', (e) => {
    if (e.button !== 0) return;
    btn.setPointerCapture(e.pointerId);
    isDragging = true;
    hasMoved = false;
    initialScreenX = e.screenX;
    initialScreenY = e.screenY;
    ipcRenderer.send('handle-drag-start');
    resetIdle();
});
window.addEventListener('pointermove', (e) => {
    if (isDragging) {
        if (!hasMoved) {
            if (Math.abs(e.screenX - initialScreenX) > 10 || Math.abs(e.screenY - initialScreenY) > 10) {
                hasMoved = true;
            }
        }
        if (hasMoved) {
            ipcRenderer.send('handle-drag');
        }
    }
});
window.addEventListener('pointerup', (e) => {
    if (isDragging) {
        isDragging = false;
        try { btn.releasePointerCapture(e.pointerId); } catch(err) {}
        ipcRenderer.send('handle-drag-end');
        if (!hasMoved) {
            ipcRenderer.send('open-sidebar');
        }
    }
    resetIdle();
});
let idleTimer;
function resetIdle() {
    if (document.body.classList.contains('idle')) {
        ipcRenderer.send('set-handle-width', 24);
    }
    document.body.classList.remove('idle');
    clearTimeout(idleTimer);
    if (!isDragging) {
        idleTimer = setTimeout(() => {
            if (!isDragging) {
                document.body.classList.add('idle');
                ipcRenderer.send('set-handle-width', 15);
            }
        }, 2000);
    }
}
window.addEventListener('mousemove', resetIdle);
window.addEventListener('mouseenter', resetIdle);
document.body.addEventListener('mouseenter', resetIdle);
window.addEventListener('mouseleave', () => {
    if (!isDragging) {
        clearTimeout(idleTimer);
        document.body.classList.add('idle');
    }
});
resetIdle();
</script>
</body>
</html>
