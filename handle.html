<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Menu Summoner</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: transparent; height: 100%; user-select: none; }
        .wrapper { width: 100%; height: 100%; display: flex; align-items: center; }

        .handle {
            box-sizing: border-box;
            background: rgba(255, 237, 242, 0.4);
            border: 3px solid rgba(255, 122, 162, 0.4);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            box-shadow: none;
            transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease, transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.5s ease;
        }

        .handle img {
            opacity: 0.6;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        /* Ch·∫ø ƒë·ªô B√°m C·∫°nh (Tai Th·ªè) */
        body.edge .wrapper { justify-content: flex-end; }
        body.edge .handle {
            width: 24px; height: 60px;
            border-right: none;
            border-radius: 14px 0 0 14px;
            cursor: grab;
        }
        body.edge .handle img { width: 14px; height: 14px; }

        .handle:hover { 
            background: rgba(255, 237, 242, 0.95); 
            border-color: rgba(255, 122, 162, 1);
            box-shadow: -2px 2px 4px rgba(0,0,0,0.15); 
        }
        .handle:hover img { opacity: 1; }

        .handle:active { transform: scale(0.94); cursor: grabbing; background: rgba(230, 200, 215, 0.9); }
    
        /* Ch? d? ngh? (Idle) - Lým m? vý l˘i v? vi?n */
        body.edge.idle .handle {
            transform: translateX(16px);
            background: rgba(255, 237, 242, 0.1);
            border-color: transparent;
        }
        body.edge.idle .handle img { opacity: 0; }
        
            transform: scale(0.6);
            background: rgba(255, 237, 242, 0.2);
            border-color: rgba(255, 122, 162, 0.2);
        }
    </style>
</head>
<body class="edge">
    <div class="wrapper">
        <div class="handle" id="btn" title="K√©o v√Ý nh·∫£ (Drag) ƒë·ªÉ d·ªùi v·ªã tr√≠. Click th·∫£ ngay ƒë·ªÉ M·ªü Menu">
            <img src="Bunny_Sunny.png">
        </div>
    </div>
    <script>
        const { ipcRenderer } = require('electron');
        const btn = document.getElementById('btn');

        let isDragging = false;
        let diffX = 0, diffY = 0;
        let hasMoved = false;
        let initialScreenX = 0, initialScreenY = 0;

        btn.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return; // Chu·ªôt tr√°i
            isDragging = true;
            hasMoved = false;
            diffX = e.clientX;
            diffY = e.clientY;
            initialScreenX = e.screenX;
            initialScreenY = e.screenY;
            ipcRenderer.send('handle-drag-start');
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                if (!hasMoved) {
                    if (Math.abs(e.screenX - initialScreenX) > 2 || Math.abs(e.screenY - initialScreenY) > 2) {
                        hasMoved = true;
                    }
                }
                if (hasMoved) {
                    ipcRenderer.send('handle-drag');
                }
            }
        });

        window.addEventListener('mouseup', (e) => { resetIdle(); 
            if (isDragging) {
                isDragging = false;
                ipcRenderer.send('handle-drag-end');
                
                if (!hasMoved) {
                    ipcRenderer.send('open-sidebar');
                }
            }
        });
        
        let idleTimer;
        function resetIdle() {
            document.body.classList.remove('idle');
            clearTimeout(idleTimer);
            if (!isDragging) {
                idleTimer = setTimeout(() => {
                    if (!isDragging) document.body.classList.add('idle');
                }, 2500); // 2.5 giay khong tuong tac se loi ve vien
            }
        }
        window.addEventListener('mousemove', resetIdle);
        window.addEventListener('mouseenter', resetIdle);
        document.body.addEventListener('mouseenter', resetIdle);
        
        resetIdle();
    </script>
</body>
</html>
