<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Menu Summoner</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: transparent; height: 100%; user-select: none; }
        .wrapper { width: 100%; height: 100%; display: flex; align-items: center; }

        .handle {
            box-sizing: border-box;
            background: rgba(255, 237, 242, 0.4);
            border: 3px solid rgba(255, 122, 162, 0.4);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            box-shadow: none;
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.1s;
        }

        .handle img {
            opacity: 0.6;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        /* Chế độ Bám Cạnh (Tai Thỏ) */
        body.edge .wrapper { justify-content: flex-end; }
        body.edge .handle {
            width: 24px; height: 60px;
            border-right: none;
            border-radius: 14px 0 0 14px;
            cursor: grab;
        }
        body.edge .handle img { width: 14px; height: 14px; }

        /* Chế độ Bóng nổi (Chat Head) */
        body.bubble .wrapper { justify-content: center; }
        body.bubble .handle {
            width: 50px; height: 50px;
            border-radius: 50%;
            cursor: grab;
        }
        body.bubble .handle img { width: 28px; height: 28px; }

        .handle:hover { 
            background: rgba(255, 237, 242, 0.95); 
            border-color: rgba(255, 122, 162, 1);
            box-shadow: -2px 2px 4px rgba(0,0,0,0.15); 
        }
        .handle:hover img { opacity: 1; }

        .handle:active { transform: scale(0.94); cursor: grabbing; background: rgba(230, 200, 215, 0.9); }
    </style>
</head>
<body class="edge">
    <div class="wrapper">
        <div class="handle" id="btn" title="Kéo và nhả (Drag) để dời vị trí. Click thả ngay để Mở Menu">
            <img src="Bunny_Sunny.png">
        </div>
    </div>
    <script>
        const { ipcRenderer } = require('electron');
        const btn = document.getElementById('btn');

        let isDragging = false;
        let diffX = 0, diffY = 0;
        let hasMoved = false;
        let initialScreenX = 0, initialScreenY = 0;

        btn.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return; // Chuột trái
            isDragging = true;
            hasMoved = false;
            diffX = e.clientX;
            diffY = e.clientY;
            initialScreenX = e.screenX;
            initialScreenY = e.screenY;
            ipcRenderer.send('handle-drag-start');
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                if (!hasMoved) {
                    if (Math.abs(e.screenX - initialScreenX) > 2 || Math.abs(e.screenY - initialScreenY) > 2) {
                        hasMoved = true;
                    }
                }
                if (hasMoved) {
                    ipcRenderer.send('handle-drag');
                }
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (isDragging) {
                isDragging = false;
                ipcRenderer.send('handle-drag-end');
                
                if (!hasMoved) {
                    ipcRenderer.send('open-sidebar');
                }
            }
        });
        
        ipcRenderer.invoke('get-handle-style').then(style => {
            document.body.className = style;
        });

        ipcRenderer.on('set-style', (e, styleName) => {
            document.body.className = styleName;
        });
    </script>
</body>
</html>
