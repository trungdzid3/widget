<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Pixel Weather Widget</title>
</head>

<body>
    <div class="widget-container">
        <div class="header">
            <span id="greeting">🌤️ Buổi Sáng</span>
            <div class="header-controls">
                <button id="sound-btn" title="Bật âm thanh">🔇</button>
                <span id="clock">--:--</span>
            </div>
        </div>

        <div class="city-bar">
            <button id="geo-btn" title="Tự động lấy vị trí">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 8C9.79 8 8 9.79 8 12C8 14.21 9.79 16 12 16C14.21 16 16 14.21 16 12C16 9.79 14.21 8 12 8ZM20.94 11C20.48 6.83 17.17 3.52 13 3.06V1H11V3.06C6.83 3.52 3.52 6.83 3.06 11H1V13H3.06C3.52 17.17 6.83 20.48 11 20.94V23H13V20.94C17.17 20.48 20.48 17.17 20.94 13H23V11H20.94ZM12 19C8.13 19 5 15.87 5 12C5 8.13 8.13 5 12 5C15.87 5 19 8.13 19 12C19 15.87 15.87 19 12 19Z" fill="currentColor"/>
                </svg>
            </button>
            <select id="city-select" title="Chọn thành phố" aria-label="Chọn thành phố">
                <option value="21.0278,105.8342">🏙 Hà Nội</option>
                <option value="10.8231,106.6297">🌆 TP. Hồ Chí Minh</option>
                <option value="16.0544,108.2022">🌉 Đà Nẵng</option>
                <option value="10.0452,105.7469">🚤 Cần Thơ</option>
                <option value="20.8449,106.6881">⚓ Hải Phòng</option>
                <option value="custom">🔍 Vị trí khác (Tự tìm)...</option>
            </select>
            <button id="city-delete-btn" title="Xóa địa điểm đã lưu" aria-label="Xóa địa điểm đã lưu">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 19C6 20.1 6.9 21 8 21H16C17.1 21 18 20.1 18 19V7H6V19ZM19 4H15.5L14.5 3H9.5L8.5 4H5V6H19V4Z" fill="currentColor"/>
                </svg>
            </button>
            <div id="city-search-box">
                <input type="text" id="city-input" placeholder="TP (Vd: Sa Pa)..." title="Nhập danh xưng thành phố (hoặc tỉnh/nước) rồi nhấn Enter">
                <button id="city-search-cancel" title="Về danh sách cũ">❌</button>
            </div>
        </div>

        <div class="char-box">
            <div id="weather-alert"></div>
            <canvas id="weather-canvas"></canvas>
            <img id="bunny-char" src="Bunny_Sunny.png" class="bunny-img" alt="thỏ cute">
            <div class="stats-overlay">
                <span>💧 <span id="humidity">--%</span></span>
                <span>💨 <span id="wind">-- km/h</span></span>
            </div>
        </div>

        <div class="info-toggle">
            <div id="view-current">
                <p class="temp" id="temp-display">--°C</p>
                <div class="status" id="weather-desc">Đang tải...</div>
            </div>
            <div id="view-forecast">
                <div class="fc-header">📅 Dự Báo 3 Ngày — nhấn để đóng</div>
                <div class="forecast-row">
                    <div class="fc-card" id="fc0">
                        <div class="fc-day">--</div>
                        <div class="fc-icon">--</div>
                        <div class="fc-hi">--</div>
                        <div class="fc-lo">--</div>
                    </div>
                    <div class="fc-card" id="fc1">
                        <div class="fc-day">--</div>
                        <div class="fc-icon">--</div>
                        <div class="fc-hi">--</div>
                        <div class="fc-lo">--</div>
                    </div>
                    <div class="fc-card" id="fc2">
                        <div class="fc-day">--</div>
                        <div class="fc-icon">--</div>
                        <div class="fc-hi">--</div>
                        <div class="fc-lo">--</div>
                    </div>
                </div>
            </div>
            <div class="app-slogan">"Chưa hoàn hảo nhưng luôn cố gắng chiều em"</div>
            <div id="meta-status" class="meta-status">⏳ Đang tải dữ liệu...</div>
        </div>

        <div id="geo-toast"></div>
    </div>

    <script src="rpg-system.js"></script>
    <script src="renderer.js" defer></script>
</body>

</html>
