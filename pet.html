<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trại Thú Ảo</title>
    <link rel="stylesheet" href="pet.css">
</head>
<body>
    <div class="pet-container" id="pet-container">
        <div class="pet-header">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span class="title" title="Pet">🐾 Pet</span>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="pet-coins" title="Tiền Xu">🪙 <span id="coin-display">0</span></div>
                <span class="drag-handle" title="Kéo để di chuyển">🖐</span>
            </div>
        </div>

        <!-- Shop Modal -->
        <div id="shop-modal" class="shop-modal" style="display:none;" onclick="if(event.target === this) window.closeModals()">
            <div class="shop-content">
                <div class="shop-header">🛒 Cửa Hàng <button type="button" id="close-shop-btn" class="close-shop-btn" onclick="window.closeModals()">✖</button></div>
                <div class="shop-items">
                    <!-- Siêu Thuốc Tiến Hóa (Test) sẽ được tự động thêm vào đây khi ở chế độ npm run test -->

                    <div class="shop-item" onclick="buyShopItem('cookie', 5, 'Bánh Quy', 'food', 15)">
                        <div class="item-icon">🍪</div>
                        <div class="item-details">
                            <div class="item-name">Bánh Quy</div>
                            <div class="item-desc">+15 XP</div>
                        </div>
                        <div class="item-cost">5 Xu</div>
                    </div>
                    <div class="shop-item" onclick="buyShopItem('apple', 20, 'Táo Vàng', 'food', 50)">
                        <div class="item-icon">🍎</div>
                        <div class="item-details">
                            <div class="item-name">Táo Vàng</div>
                            <div class="item-desc">+50 XP</div>
                        </div>
                        <div class="item-cost">20 Xu</div>
                    </div>
                    <div class="shop-item" onclick="buyShopItem('meat', 40, 'Đùi Thịt', 'food', 120)">
                        <div class="item-icon">🍖</div>
                        <div class="item-details">
                            <div class="item-name">Đùi Thịt</div>
                            <div class="item-desc">+120 XP</div>
                        </div>
                        <div class="item-cost">40 Xu</div>
                    </div>

                    <div class="shop-item" onclick="buyShopItem('box', 30, 'Hộp Bí Ẩn', 'instant', 0)">
                        <div class="item-icon">🎁</div>
                        <div class="item-details">
                            <div class="item-name">Hộp Bí Ẩn</div>
                            <div class="item-desc">Dùng Ngay</div>
                        </div>
                        <div class="item-cost">30 Xu</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Inventory Modal (Túi thức ăn) -->
        <div id="inventory-modal" class="shop-modal" style="display:none;" onclick="if(event.target === this) window.closeModals()">
            <div class="shop-content">
                <div class="shop-header">🎒 Túi Food <button type="button" id="close-inv-btn" class="close-inv-btn" onclick="window.closeModals()">✖</button></div>

                <div class="shop-items" id="inventory-items">
                    <!-- Sẽ render bằng JS -->
                </div>
            </div>
        </div>

        <!-- Chọn loài (hiện chỉ khi chưa có pet hoặc đang ở trứng lv1) -->
        <div id="species-picker" class="species-picker" style="display:none;">
            <div class="picker-title">✨ Chọn Tinh Linh</div>
            <div class="species-grid">
                <button class="species-btn" data-species="cat">🐱<br><small>Mèo Thần</small></button>
                <button class="species-btn" data-species="dragon">🐉<br><small>Rồng Thần</small></button>
                <button class="species-btn" data-species="bunny">🐰<br><small>Thỏ Trăng</small></button>
                <button class="species-btn" data-species="mascot">🐣<br><small>Mascot</small></button>
                <button class="species-btn" data-species="dog">🐶<br><small>Chó</small></button>
                <button class="species-btn" data-species="owl">🦉<br><small>Cú Mèo</small></button>
            </div>
        </div>

        <!-- Giao diện Pet chính -->
        <div id="pet-main">
            <div class="pet-stage">
                <div class="pet-sprite" id="pet-sprite">🥚</div>
                <div class="evolution-fx" id="evo-fx"></div>
            </div>

            <div class="pet-dashboard">
                <div class="pet-info">
                    <div style="display: flex; align-items: center; gap: 6px;">
                        <div class="pet-name" id="pet-name">Trứng Bí Ẩn</div>
                        <button id="change-species-btn" class="change-species-btn" title="Đổi loài">↩ Đổi</button>
                    </div>
                    <div class="pet-level">Lv.<span id="pet-lv">1</span></div>
                </div>

                <!-- Thanh EXP của Pet -->
                <div class="exp-bar-wrap">
                    <div class="exp-bar-track">
                          <div class="exp-bar-fill" id="exp-bar"></div>
                          <div class="exp-text-overlay"><span id="pet-exp-cur">0</span> / <span id="pet-exp-req">60</span> XP</div>
                      </div>
                </div>

                <div class="pet-actions">
                    <div class="action-row">
                        <button id="feed-btn" class="action-btn feed" onclick="window.openInventory()">🎒 Túi Đồ</button>
                        <button id="shop-btn" class="action-btn shop" onclick="document.getElementById('shop-modal').style.display='flex'">🛒 Mua Đồ</button>
                    </div>
                    
                </div>
            </div>

            <!-- Trạng thái Buff đang chạy -->
            <div id="buff-status" class="buff-status" style="display:none;"></div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="rpg-system.js"></script>
    <script src="pet.js"></script>
</body>
</html>
