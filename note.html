<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Pixel Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="note.css">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';">
</head>

<body>
    <script>window.onerror = function (m, s, l, c, e) { require('fs').writeFileSync('n_error.log', m + ' ' + s + ' ' + l); }</script>
    <script src="rpg-system.js"></script>

    <div class="note-container">
        <!-- HEADER KÉO -->
        <div class="drag-header">
            <div class="header-left">
                <span class="title-text">📝 Nhiệm Vụ</span>
            </div>
            <div class="header-right">
                <span class="rpg-coins">🪙 <span id="rpg-coins-display">0</span></span>
                <span class="drag-handle" title="Kéo để di chuyển">🖐</span>
            </div>
        </div>

        <!-- MAIN LAYOUT -->
        <div class="main-layout">
            <!-- Bảng bần -->
            <div class="corkboard" id="corkboard">
                <!-- Các mảnh giấy sinh ra ở đây -->
            </div>
        </div>

        <!-- Desk / Nhân vật -->
        <div class="desk-area">
            <div class="desk-surface">
                <!-- Lời thoại -->
                <div class="speech-bubble" id="speech-bubble">
                    Tạo nhiệm vụ mới ở tập giấy vàng góc kia nha!
                </div>

                <!-- Đồ đạc trên bàn -->
                
                <!-- Tập sách = Nút thêm folder -->
                <img src="books.png" id="btn-add-folder" class="custom-book-img" title="Thêm danh sách" />

                <img src="rabbit-sleep.gif" id="rabbit-mascot" class="rabbit-mascot" alt="Thỏ" title="Click để đổi hành vụ!" />

            </div>
            <div class="desk-front"></div>
        </div>

        
        <!-- STAMP ANIMATION -->
        <div id="stamp-animation" class="stamp-overlay">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200" style="filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));">
                <circle cx="50" cy="50" r="45" stroke="#e53935" stroke-width="6" fill="none"/>
                <circle cx="50" cy="50" r="38" stroke="#e53935" stroke-width="2" fill="none"/>
                <text x="50" y="55" font-family="sans-serif" font-weight="bold" font-size="20" fill="#e53935" text-anchor="middle" transform="rotate(-15, 50, 50)">HOÀN THÀNH</text>
            </svg>
        </div>

        <!-- GIAO DIỆN TASK (CLASSIC RESTORED) -->
        <div id="note-view" class="overlay hidden">
            <div class="task-paper">
                <button id="btn-close-note" class="close-btn">X</button>
                <button id="btn-delete-folder" class="delete-folder-btn">🗑️</button>
                <button id="btn-change-color" class="change-color-btn hidden">🎨</button>
                
                <div class="pin"></div>
                <h2 id="note-title" class="pixel-text">Tên Nhiệm Vụ</h2>
                
                <div id="edit-color-picker" class="hidden">
                    <div id="edit-color-options"></div>
                </div>

                <div class="task-list" id="task-list"></div>

                <div class="add-task-container">
                    <input type="text" id="input-new-task" placeholder="(thêm việc mới của Boss...)">
                    <button id="btn-add-task" class="btn-pixel-add">THÊM</button>
                </div>

                <button id="btn-complete-folder" class="btn-complete-folder">NỘP NHIỆM VỤ & NHẬN THƯỞNG</button>
            </div>
        </div>

        <!-- MODAL TẠO FOLDER (CLASSIC RESTORED) -->
        <div id="create-modal" class="overlay hidden">
            <div class="pixel-modal">
                <h3 class="pixel-text">Tạo Danh Sách Nhiệm Vụ</h3>
                <input type="text" id="input-folder-name" placeholder="Tên nhiệm vụ mới của Boss..." autocomplete="off">
                
                <div id="color-picker-container" class="color-picker hidden" style="margin-bottom: 20px;">
                    <div class="pixel-text" style="font-size:18px; color: #5d4037; margin-bottom: 8px;">CHỌN MÀU BÌA:</div>
                    <div id="color-options" style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;"></div>
                </div>

                <div class="modal-actions">
                    <button class="btn-pixel cancel" id="btn-cancel-folder">HỦY BỎ</button>
                    <button class="btn-pixel ok" id="btn-confirm-folder">TẠO NHIỆM VỤ</button>
                </div>
            </div>
        </div>
    </div>

    <script src="note.js" defer></script>
</body>

</html>
