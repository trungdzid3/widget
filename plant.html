<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trạm Lofi Focus</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="plant.css">
</head>
<body>
    <div class="plant-container">
        <script>window.onerror = function(m, s, l, c, e) { require('fs').writeFileSync('p_error.log', m + ' ' + s + ' ' + l); }</script>
        <script src="rpg-system.js"></script>
        <div class="header">
            <span>⏳ Đếm Ngược</span>
            <span class="drag-handle" title="Kéo viền để di chuyển">🖐</span>
        </div>


        <!-- Music Control Bar (Cat Tier 1+) -->
        <div id="music-bar" class="music-bar hidden">
            <div class="music-info">
                <div id="music-visualizer" class="visualizer">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>
                <span id="now-playing" class="playing-text">Radio: Đang tải...</span>
            </div>
            <div class="music-btns">
                <button id="music-prev" class="mini-btn" title="Kênh trước">◀</button>
                <button id="music-next" class="mini-btn" title="Kênh tiếp">▶</button>
            </div>
        </div>

        <div class="pomodoro">
            <select id="task-type" class="task-selector">
                <option value="egg">15 Phút - Ấp Trứng Rồng</option>
                <option value="plant" selected>25 Phút - Trồng Cây Lofi</option>
                <option value="house">45 Phút - Xây Lâu Đài</option>
                <option value="potion">60 Phút - Luyện Tiên Đan</option>
            </select>
            
            <div class="main-display">
                <div id="plant-stage" class="stage">🌱</div>
                <div class="info-bar">
                    <div class="timer-wrapper">
                        <button id="time-minus" class="time-btn hidden">-</button>
                        <div id="timer" class="time" title="Nhấn để chỉnh phút">25:00</div>
                        <input type="number" id="inline-timer-input" class="inline-timer-input hidden" min="1" max="180">
                        <button id="time-plus" class="time-btn hidden">+</button>
                    </div>
                    <div class="msg" id="pomo-msg">Chờ lệnh...</div>
                </div>
            </div>
            
            <div class="control-row">
                <button id="pomo-play">Bắt Đầu</button>
                <button id="pomo-reset" class="btn-alt">Huỷ</button>
                <div class="vol-control">
                    <span id="vol-icon">🔉</span>
                    <input type="range" id="vol-slider" min="0" max="100" value="50">
                </div>
            </div>
        </div>
    </div>
    </div>

    <!-- Music Player (Sử dụng hệ thống Radio Lofi chuẩn) -->
    <audio id="lofi-audio" preload="none" crossorigin="anonymous"></audio>


    <script src="plant.js"></script>
</body>
</html>
