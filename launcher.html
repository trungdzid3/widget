<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="launcher.css">
    <title>Thanh Bên Lofi</title>
</head>

<body>
    <div class="dashboard">
        <button id="close-btn" title="Gập thanh bên (Đóng)">▶</button>
        <div class="content-wrapper">
            <div>
                <h1 class="title">🐰 Điều Khiển</h1>
                <p class="slogan">"Chưa hoàn hảo nhưng luôn cố gắng chiều em"</p>

                <div class="widget-list">
                    <div class="widget-item">
                        <span class="icon">🌤️</span>
                        <div class="info">
                            <h2>Thời Tiết</h2>
                        </div>
                        <button class="pin-btn" id="pin-weather" title="Hoá đá xuyên chuột"></button>
                        <label class="switch">
                            <input type="checkbox" id="toggle-weather">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="widget-item">
                        <span class="icon">📝</span>
                        <div class="info">
                            <h2>Nhiệm Vụ</h2>
                        </div>
                        <button class="pin-btn" id="pin-note" title="Hoá đá xuyên chuột"></button>
                        <label class="switch">
                            <input type="checkbox" id="toggle-note">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="widget-item">
                        <span class="icon">⏳</span>
                        <div class="info">
                            <h2>Đếm ngược</h2>
                        </div>
                        <button class="pin-btn" id="pin-plant" title="Hoá đá xuyên chuột"></button>
                        <label class="switch">
                            <input type="checkbox" id="toggle-plant">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="widget-item">
                        <span class="icon">🐾</span>
                        <div class="info">
                            <h2>Thú Cưng</h2>
                        </div>
                        <button class="pin-btn" id="pin-pet" title="Hoá đá xuyên chuột"></button>
                        <label class="switch">
                            <input type="checkbox" id="toggle-pet">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="widget-item">
                        <span class="icon">📅</span>
                        <div class="info">
                            <h2>Lịch</h2>
                        </div>
                        <button class="pin-btn" id="pin-calendar" title="Hoá đá xuyên chuột"></button>
                        <label class="switch">
                            <input type="checkbox" id="toggle-calendar">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <div class="settings-box">
                    <label class="checkbox-opt">
                        <input type="checkbox" id="toggle-startup">
                        <span>Khởi động cùng Windows</span>
                    </label>
                    
                </div>
            </div>

            <div class="footer-hint">Bấm 🧊 để <b>Hoá Đá</b> Widget.<br>Chuột sẽ Click đi xuyên qua nó!</div>
        </div>
        <div id="app-version-display" style="text-align: center; font-size: 10px; margin-top: 8px; margin-bottom: 8px; color: #aaab;"></div>
    </div>
    <script src="launcher.js"></script>
<script>require('electron').ipcRenderer.on('play-open', () => document.body.classList.add('open')); require('electron').ipcRenderer.on('play-close', () => document.body.classList.remove('open'));</script></body>

</html>
